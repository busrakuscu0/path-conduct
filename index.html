<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PacePad | Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="body-flex">
      <header>
        <nav class="nav">
          <a href="#" class="nav__logo"
            ><img src="./assets/pacepad-logo.svg" alt="Pacepad Logo" />
          </a>
          <ul class="nav__list">
            <li class="nav__list-item">
              <img src="./assets/icons/core-icon.svg" alt="Core Icon" />
              <a href="#" class="list-item--active">CORE</a>
            </li>
            <li class="nav__list-item">
              <img src="./assets/icons/mission-icon.svg" alt="Mission Icon" />
              <a href="./missions.html">MISSONS</a>
            </li>
            <li class="nav__list-item">
              <img src="./assets/icons/strategy-icon.svg" alt="Strategy Icon" />
              <a href="./strategies.html">STRATEGIES</a>
            </li>
          </ul>
          <a href="addmission.html" class="btn btn--primary"
            >INITIATE MISSION</a
          >
        </nav>
      </header>

      <main class="main__container">
        <div class="workspace">
          <div class="mission-creator">
            <input
              type="text"
              id="createMissionInput"
              placeholder="Identify the target..."
              class="mission-creator__input"
            />
            <a href="startmission.html" class="btn btn--secondary"
              ><span class="btn__content"
                >CREATE <br />
                MISSION
                <img
                  src="./assets/icons/arrow-forward.svg"
                  alt="Arrow Right Icon"
              /></span>
            </a>
          </div>
          <div class="focus-missions"></div>
        </div>
        <div class="progress-card"></div>
      </main>
    </div>
    <footer class="footer">
      <a href="#">CORE</a>
      <span>© 2026, Pacepad. All rights reserved.</span>
      <span class="footer-right">
        <a href="mailto:busra.kuscu@code2career.eu">Report</a>
        <p>• LOCAL DATA</p>
      </span>
    </footer>
    <script src="./script.js"></script>
  </body>
</html>
